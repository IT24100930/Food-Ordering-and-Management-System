spring.application.name=smart-food-system

# Default local profile (H2) so the system runs out of the box
spring.datasource.url=jdbc:h2:file:./data/smart-food-system;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Server
server.port=8090
server.servlet.context-path=/api

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
